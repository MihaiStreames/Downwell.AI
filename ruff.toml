src = ["src", "scripts", "tests"]
target-version = "py313"
line-length = 160

[lint]
select = ["ALL"]
ignore = [
  "COM812",  # missing trailing comma
  "ISC001",  # single line implicit string concat
]
fixable = ["ALL"]
unfixable = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = 160

[lint.isort]
force-single-line = true
force-sort-within-sections = true
lines-after-imports = 2
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "local-folder",
]

[lint.pydocstyle]
convention = "numpy"

[lint.pylint]
max-args = 7
max-branches = 20
max-returns = 6
max-statements = 60
