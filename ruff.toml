line-length = 160
target-version = "py313"

[lint]
select = [
  "E",
  "W",
  "F",
  "I",
  "N",
  "UP",
  "B",
  "C4",
  "SIM",
  "ARG",
  "PTH",
  "RET",
  "PL",
  "PERF",
]

ignore = [
  "E501",
  "PLR0913",
  "PLR2004",
  "RET504",
  "SIM108",
  "B008",
  "PLW0603",
  "PLC0415",
  "ARG001",
  "PLR0911",
  "PLR0912",
  "PLR0915",
]

fixable = ["ALL"]
unfixable = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 80

[lint.isort]
force-single-line = true
force-sort-within-sections = true
lines-after-imports = 2
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "local-folder",
]

[lint.pydocstyle]
convention = "numpy"

[lint.pylint]
max-args = 7
max-branches = 20
max-returns = 6
max-statements = 60
