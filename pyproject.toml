[project]
name = "downwell-ai"
version = "1.0.2"
description = "Downwell AI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.4.4,<3.0",
    "opencv-python>=4.13.0.92",
    "pillow>=12.2.0",
    "matplotlib>=3.10.9",
    "mss>=10.2.0",
    "loguru>=0.7.3",
    "torch>=2.11.0",
    "torchvision",
    "torchaudio",
    "types-pyautogui>=0.9.3.20260408",
]

[project.optional-dependencies]
windows = [
    "pyautogui>=0.9.54",
    "pygetwindow>=0.0.9",
    "pymem>=1.14.0",
    "keyboard>=0.13.5",
    "pywin32>=311.0",
]
dev = [
  "ruff>=0.15.12",
  "ssort>=0.16.0",
  "ty>=0.0.34",
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }

[tool.ty.environment]
python-version = "3.14"
