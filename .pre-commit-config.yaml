repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  - repo: local
    hooks:
      - id: sorting
        name: ssort
        entry: uvx ssort
        language: system
        types: [python]
        pass_filenames: false

      - id: typing
        name: ty
        entry: uvx ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: tests
        name: pytest
        entry: uvx pytest
        language: system
        types: [python]
        pass_filenames: false
